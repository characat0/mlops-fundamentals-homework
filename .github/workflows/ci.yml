name: CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          pip install flake8 pytest
          pip install -r data_pipeline/requirements.txt
          pip install -r model_serving/requirements.txt
          pip install -r drift_monitoring/requirements.txt
          
      - name: Run Linter
        run: flake8 .
        
      - name: Run Tests
        env:
          PYTHONPATH: ${{ github.workspace }}/data_pipeline:${{ github.workspace }}/model_serving
        run: |
          pytest data_pipeline/tests
          pytest model_serving/tests

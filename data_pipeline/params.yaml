data:
  # 550k Spotify Songs (Kaggle) - Downloaded as CSV
  # https://www.kaggle.com/datasets/serkantysz/550k-spotify-songs-audio-lyrics-and-genres
  source_path: "songs.csv"  # Downloaded CSV file
  train_year_threshold: 2010  # Pre-2010 = training, Post-2010 = production simulation (streaming era shift)

train:
  logistic_regression:
    C: 1.0
    max_iter: 1000
  xgboost:
    max_depth: 6
    learning_rate: 0.1
    n_estimators: 100
